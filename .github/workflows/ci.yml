name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: panel/go.mod
      - uses: bufbuild/buf-setup-action@v1
      - name: Install web protoc plugins
        run: cd web && bun install --frozen-lockfile
      - run: moon run panel:check-generate

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - run: moon run web:lint web:format-check web:typecheck web:test

  panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: panel/go.mod
      - name: Install CGO dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc libc6-dev libsqlite3-dev
      - run: moon run panel:test

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: node/go.mod
      - run: moon run node:test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - name: Run full E2E suite
        run: moon run e2e:test
