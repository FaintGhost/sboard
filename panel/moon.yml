tasks:
  dev:
    command: go
    args:
      - run
      - ./panel/cmd/panel
    env:
      PANEL_HTTP_ADDR: ":8080"
      PANEL_DB_PATH: panel.db
      PANEL_JWT_SECRET: dev-secret-please-change-in-production
      PANEL_CORS_ALLOW_ORIGINS: http://localhost:5173
      PANEL_NODE_RPC_SCHEME: http
      PANEL_LOG_REQUESTS: "true"
      PANEL_SERVE_WEB: "true"
      PANEL_WEB_DIR: web/dist
    options:
      runFromWorkspaceRoot: true

  generate:
    command: go
    args:
      - generate
      - ./internal/rpc/...
    options:
      cache: false

  check-generate:
    deps:
      - panel:generate
    command: bash
    args:
      - panel/check-generate.sh
    options:
      cache: false
      runFromWorkspaceRoot: true

  test:
    command: go
    args:
      - test
      - ./...
      - -count=1
    options:
      cache: false
